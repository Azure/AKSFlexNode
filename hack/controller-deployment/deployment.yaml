apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-flex-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aks-flex-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aks-flex-controller
    spec:
      serviceAccountName: aks-flex-controller
      containers:
        - name: aks-flex-controller
          image: ghcr.io/azure/aks-flex-controller:controller-hbc-proxy-65aa5b2
          imagePullPolicy: Always
          args:
            - --listen-address=:8080
            - --machine-configmap-namespace=kube-system
            - --machine-configmap-name=aks-flex-machines
            - --enable-csr-approver=false
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
