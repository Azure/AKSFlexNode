apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-flex-controller-registry
  labels:
    app.kubernetes.io/name: aks-flex-controller-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aks-flex-controller-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aks-flex-controller-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          ports:
            - name: registry
              containerPort: 5000
              hostPort: 5000
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 5
            periodSeconds: 20
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
      volumes:
        - name: registry-data
          emptyDir: {}
