# Sample multi-replica application for AKS Flex Node drain demos.
#
# Deploy:
#   kubectl apply -f hack/demo/sample-application.yaml
#
# Watch placement across europe-site nodes:
#   kubectl -n aks-flex-demo get pods -o wide -w
#
# The deployment is intentionally not a DaemonSet. It uses node affinity for the
# site label and topology spread across hostnames so the scheduler can place
# replicas on multiple nodes in the same site, then move them during drain.
apiVersion: v1
kind: Namespace
metadata:
  name: aks-flex-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-web
  namespace: aks-flex-demo
  labels:
    app.kubernetes.io/name: site-web
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: site-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: site-web
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: net.unbounded-cloud.io/site
                    operator: In
                    values:
                      - europe-site
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: site-web
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.53
          imagePullPolicy: IfNotPresent
          args:
            - netexec
            - --http-port=8080
            - --udp-port=0
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /hostname
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: site-web
  namespace: aks-flex-demo
  labels:
    app.kubernetes.io/name: site-web
spec:
  selector:
    app.kubernetes.io/name: site-web
  ports:
    - name: http
      port: 80
      targetPort: http
