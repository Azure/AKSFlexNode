# This drop-in file is managed by aks-flex-node-agent. Do not edit directly.
# It instructs systemd to load /etc/default/kubelet as an optional environment
# file. /etc/default/kubelet itself is NOT managed by the agent; place it on
# disk before or after the agent runs to inject or override kubelet settings.
#
# Any variable defined in /etc/default/kubelet overrides the values set by
# earlier agent-managed drop-ins (10-flex-node-kubeconfig.conf,
# 20-flex-node-node-config.conf). Higher-numbered drop-ins such as
# 90-custom.conf will in turn override this file.
#
# Example /etc/default/kubelet:
#
#   KUBELET_KUBECONFIG_ARGS=--kubeconfig=/etc/kubernetes/custom-kubeconfig
#   KUBELET_EXTRA_ARGS=--feature-gates=SomeFeature=true
#
[Service]
EnvironmentFile=-/etc/default/kubelet
