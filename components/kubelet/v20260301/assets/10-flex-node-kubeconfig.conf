# Managed by aks-flex-node-agent. Do not edit directly.
# To override the kubeconfig used by kubelet, create a higher-numbered drop-in
# under /etc/systemd/system/kubelet.service.d/ that redefines KUBELET_KUBECONFIG_ARGS.
# Example: /etc/systemd/system/kubelet.service.d/90-custom-kubeconfig.conf
#
#   [Service]
#   Environment="KUBELET_KUBECONFIG_ARGS=--kubeconfig=/path/to/custom-kubeconfig"
#
[Service]
{{- if .UseBootstrapKubeconfig}}
Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig={{.BootstrapKubeconfigPath}} --kubeconfig={{.KubeconfigPath}} --rotate-certificates={{.RotateCertificates}}"
{{- else}}
Environment="KUBELET_KUBECONFIG_ARGS=--kubeconfig={{.KubeconfigPath}} --rotate-certificates={{.RotateCertificates}}"
{{- end}}
