# Managed by aks-flex-node-agent. Do not edit directly.
# To adjust node labels, verbosity, DNS, or resource thresholds, modify the
# agent configuration and let the agent reconcile changes.
# You may create a higher-numbered drop-in (e.g. 90-custom-node-config.conf)
# to append or override individual env vars.
[Service]
Environment="KUBELET_NODE_CONFIG_ARGS=--node-labels={{.NodeLabels}} --v={{.Verbosity}} --client-ca-file={{.ClientCAFile}}{{range .ClusterDNS}} --cluster-dns={{.}}{{end}}{{if .NodeIP}} --node-ip={{.NodeIP}}{{end}}"
Environment="KUBELET_TUNING_ARGS=--eviction-hard={{.EvictionHard}} --kube-reserved={{.KubeReserved}} --image-gc-high-threshold={{.ImageGCHighThreshold}} --image-gc-low-threshold={{.ImageGCLowThreshold}} --max-pods={{.MaxPods}}"
